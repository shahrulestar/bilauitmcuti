name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build project
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'placeholder-groq-key' }}
        run: pnpm build

      - name: Measure Cloudflare worker bundle (gzip)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'placeholder-groq-key' }}
        run: |
          pnpm exec opennextjs-cloudflare build
          echo "=== Main worker ==="
          pnpm exec wrangler deploy --dry-run 2>&1 | rg "Total Upload" || true
          echo "=== Chat API worker ==="
          pnpm exec wrangler deploy --config workers/chat-api/wrangler.jsonc --dry-run 2>&1 | rg "Total Upload" || true
